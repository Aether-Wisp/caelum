<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Caelum 渗透测试系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../src/caelum/static/css/caelum.css" />
  </head>
  <body class="antialiased min-h-screen bg-[#F7F9FC] text-[#4E5969]">
    <div class="flex h-screen overflow-hidden">
      <!-- Left Sidebar (15%) -->
      <aside
        class="w-[15%] min-w-[240px] bg-[#F7F9FC] neu-card m-4 flex flex-col flex-shrink-0 z-10 transition-transform duration-300 md:block hidden"
      >
        <!-- Logo -->
        <div
          class="h-[8vh] flex items-center px-6 border-b border-[#E5E6EB]/50"
        >
          <iconify-icon
            icon="lucide:hexagon"
            class="text-2xl text-[#1677FF]"
          ></iconify-icon>
          <span class="text-xl font-bold text-[#1D2129] ml-3 tracking-wide"
            >Caelum</span
          >
        </div>

        <!-- Navigation Menu -->
        <nav class="flex-1 py-6 px-4 space-y-3 overflow-y-auto flex flex-col">
          <a
            href="#test-tasks"
            class="nav-item neu-nav-item active flex items-center px-4 py-3 rounded-xl text-[#4E5969] hover:text-[#1677FF] hover:bg-[#E8F3FF] transition-all font-medium"
          >
            <iconify-icon
              icon="lucide:shield-check"
              class="text-xl w-6"
            ></iconify-icon>
            <span class="ml-3">测试任务</span>
          </a>
          <a
            href="#payload-generator"
            class="nav-item neu-nav-item flex items-center px-4 py-3 rounded-xl text-[#4E5969] hover:text-[#1677FF] hover:bg-[#E8F3FF] transition-all font-medium"
          >
            <iconify-icon
              icon="lucide:code-2"
              class="text-xl w-6"
            ></iconify-icon>
            <span class="ml-3">Payload生成</span>
          </a>
          <a
            href="#history-logs"
            class="nav-item neu-nav-item flex items-center px-4 py-3 rounded-xl text-[#4E5969] hover:text-[#1677FF] hover:bg-[#E8F3FF] transition-all font-medium"
          >
            <iconify-icon
              icon="lucide:history"
              class="text-xl w-6"
            ></iconify-icon>
            <span class="ml-3">历史日志</span>
          </a>
        </nav>
      </aside>

      <!-- Main Content Area -->
      <div class="flex-1 flex flex-col overflow-hidden w-full md:w-[85%]">
        <!-- Top Navigation Bar (8%) -->
        <header
          class="h-[8vh] bg-[#FFFFFF] shadow-sm flex items-center justify-between px-8 flex-shrink-0 z-20"
        >
          <div class="flex items-center">
            <h1
              id="page-title"
              class="text-[24px] font-semibold text-[#1D2129] tracking-tight"
            >
              安全测试任务
            </h1>
          </div>

          <div class="flex items-center space-x-6">
            <button
              class="relative p-2 text-[#86909C] hover:text-[#1677FF] hover:bg-[#F7F9FC] rounded-lg transition-all duration-300"
            >
              <iconify-icon
                icon="lucide:bell"
                class="text-[22px]"
              ></iconify-icon>
              <span
                class="absolute top-1.5 right-1.5 w-2.5 h-2.5 bg-[#FF4D4F] border-2 border-white rounded-full"
              ></span>
            </button>
            <div
              class="flex items-center cursor-pointer hover:opacity-80 transition-opacity"
            >
              <div
                class="w-9 h-9 rounded-full bg-[#E8F3FF] flex items-center justify-center text-[#1677FF] text-sm font-semibold border border-[#1677FF]/20 shadow-inner"
              >
                A
              </div>
              <span
                class="ml-3 text-sm font-medium text-[#1D2129] hidden sm:block"
                >Administrator</span
              >
            </div>
          </div>
        </header>

        <!-- Dynamic Sub-page Container -->
        <main
          class="flex-1 overflow-y-auto p-6 md:p-8 bg-[#F7F9FC] scroll-smooth fade-in"
        >
          <!-- Content injected by caelum.js -->
        </main>
      </div>
    </div>

    <!-- Script -->
    <script src="../src/caelum/static/js/caelum.js"></script>
  </body>
</html>
