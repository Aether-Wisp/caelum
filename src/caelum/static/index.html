<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Caelum 智能渗透测试系统</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/new_style.css" />
  </head>
  <body>
    <!-- 左侧导航和历史栏 -->
    <aside class="sidebar">
      <div class="logo">
        <span class="logo-icon">🛡️</span>
        <h1>Caelum</h1>
      </div>

      <div class="nav-menu">
        <div class="nav-item active">
          <span>🕒 任务管理</span>
        </div>
      </div>

      <div class="history-container">
        <div class="history-title">📋 测试历史</div>
        <div class="history-list" id="sidebar-history-list">
          <div class="empty-state">暂无测试记录</div>
        </div>
      </div>
    </aside>

    <!-- 右侧主内容区 -->
    <main class="main-content">
      <div class="header-section">
        <h1 class="main-title">🚀 Caelum v8.0</h1>
        <p class="subtitle">AI驱动的复杂场景多级渗透测试平台 (支持Bugku PAR)</p>
        <p class="desc">
          输入目标节点，系统自动完成信息收集、漏洞扫描及内网横向移动分析
        </p>
      </div>

      <!-- 核心功能卡片网格 -->
      <div class="cards-grid">
        <!-- 左卡片：开始测试 -->
        <div class="card">
          <div
            style="
              display: flex;
              align-items: flex-end;
              justify-content: space-between;
              margin-bottom: 20px;
            "
          >
            <h2 style="margin-bottom: 0">🎯 开始渗透测试</h2>
            <span
              style="
                font-size: 12px;
                color: #10b981;
                font-weight: 600;
                background: rgba(16, 185, 129, 0.1);
                padding: 4px 8px;
                border-radius: 12px;
              "
              >✅ 多阶段链式攻击引擎已就绪</span
            >
          </div>
          <form id="main-test-form">
            <div class="form-group">
              <label>目标IP地址或域名(至多支持4个目标,逗号分隔):</label>
              <input
                type="text"
                id="target-ip"
                required
                placeholder="例如: 192.168.1.100, example.com"
              />
            </div>
            <div class="form-group">
              <label>AI分析模型:</label>
              <select id="ai-model-select">
                <option value="gpt-4">GPT-4 (推荐)</option>
                <option value="deepseek">DeepSeek</option>
                <option value="claude-3">Claude-3</option>
              </select>
            </div>
            <button type="submit" class="btn btn-primary" id="start-test-btn">
              🚀 开始智能渗透测试
            </button>
          </form>

          <!-- 测试进度区域 (多目标并发卡片) -->
          <div id="active-tasks-container" class="active-tasks-container"></div>
        </div>

        <!-- 右卡片：Payload生成 -->
        <div class="card dark-card">
          <h2>🎯 Payload 生成器</h2>
          <form id="payload-form">
            <div class="form-group">
              <label>PAYLOAD 类型:</label>
              <select id="payload-type">
                <option value="">选择一个类型...</option>
                <option value="xss">XSS Payload</option>
                <option value="sqli">SQLi Payload</option>
                <option value="rce">RCE Payload</option>
              </select>
            </div>
            <div class="form-group">
              <label>参数 (JSON 格式):</label>
              <textarea
                id="payload-params"
                rows="5"
                placeholder='示例: {"length": 10, "encoding": "base64"}'
              ></textarea>
            </div>
            <button type="submit" class="btn btn-success">
              🚀 生成 Payload
            </button>
          </form>
          <div
            id="payload-result"
            class="payload-result"
            style="display: none"
          ></div>
        </div>
      </div>
    </main>

    <div id="toast" class="toast"></div>

    <script src="/static/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </body>
</html>
